name: Validate

on:
  workflow_dispatch:
  push:
    branches: ["main", "feature/**"]
  pull_request:

jobs:
  verify-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm ci
      - name: Test frontend
        run: npm run test
      - name: Build frontend
        run: npm run build
      - name: Test Rust commands
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Compile Windows desktop application
        run: npm run tauri build -- --no-bundle
