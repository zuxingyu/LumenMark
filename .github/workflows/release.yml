name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Apple Silicon Rust target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin
      - name: Install frontend dependencies
        run: npm ci
      - name: Test frontend
        run: npm run test
      - name: Test Rust commands
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Bundle and upload release asset
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LumenMark ${{ github.ref_name }}
          releaseBody: |
            ## LumenMark v0.3.9 更新内容

            ### 新增与优化
            - 新增 CSS-only Typora 风格主题导入，主题文件会复制到本机应用数据目录，不保存用户原始路径。
            - 新增原生“主题”菜单，可在跟随系统、浅色主题、深色主题和已导入主题之间切换。
            - 新增“设置”弹窗，集中放置语言切换、主题导入和主题选择。
            - 默认主题跟随系统浅色/深色模式，内置浅色与深色两套基础主题。
            - 移除顶部 LumenMark 图标和文字标题栏，扩大正文编辑区域。

            ### BUG 修复
            - 修复深色模式下 CodeMirror 代码块背景仍然发白的问题。
            - 修复代码块工具按钮在深色模式下未跟随代码块背景的问题。
            - 修复导入主题可能通过远程 URL、本地绝对路径或 `@import` 泄露资源路径的问题。
            - 合入 v0.3.8 下标 hotfix，确保 `~2~` 保存时不再被转义。

            ### 测试结果
            - 已执行前端单元与组件测试、生产构建、Rust/Tauri 命令测试。
            - 已新增 `docs/qa/v0.3.9-regression-report.md`，记录自动化测试、手动 QA、主题导入检查与已知风险。

            ### 后续规划
            - 中远期版本会支持导入完整 Typora 主题文件夹，包含 CSS、字体、图片等 assets 的复制、路径重写和安全校验。

            ### 发布说明
            - Windows 安装包仍为未签名测试版本，首次运行可能出现 SmartScreen 提示。
            - macOS DMG 使用系统 WebKit Runtime，应用包为 ad-hoc 签名，尚未 Apple 公证。
            - 本项目已公开，发布前已进行敏感信息扫描，未包含密钥、证书、私有配置、本地个人路径或账号信息。
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
