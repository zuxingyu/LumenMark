name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Apple Silicon Rust target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin
      - name: Install frontend dependencies
        run: npm ci
      - name: Test frontend
        run: npm run test
      - name: Test Rust commands
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Bundle and upload release asset
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LumenMark ${{ github.ref_name }}
          releaseBody: |
            ## LumenMark v0.3.6 更新内容

            ### 新增与优化
            - 新增 HTML、PDF、PNG 直接导出，导出内容仅包含当前文档正文渲染结果。
            - 菜单栏跟随语言切换显示中文或英文，不再中英文双语混排。
            - 新建文档去除外层“未命名”标题，正文编辑区进一步扩宽，更适合沉浸式写作。
            - 工作区文件树只展示包含 Markdown 文件的目录，并支持长文件名横向滚动。
            - 代码块复制和自动换行按钮改为同一行图标按钮，语言标签和工具按钮默认常驻显示。

            ### BUG 修复
            - 修复深色系统主题下部分编辑区域仍显示白色背景的问题。
            - 修复当前行左侧 “+” 和点阵拖拽图标干扰写作的问题。
            - 修复代码块复制按钮与自动换行按钮重叠的问题。
            - 修复使用 ```j 唤醒代码块语言联想时，上下键移动光标而不是选择 Java/JSON 的问题。
            - 修复代码块内回车后缩进位置不符合代码书写习惯的问题。
            - 修复 Bash/Shell 代码中部分 # 注释高亮不完整的问题。

            ### 发布说明
            - Windows 安装包仍为未签名测试版本，首次运行可能出现 SmartScreen 提示。
            - macOS DMG 使用系统 WebKit Runtime，应用包为 ad-hoc 签名，尚未 Apple 公证。
            - 本项目已公开，发布前已进行敏感信息扫描，未包含密钥、证书、私有配置、本地个人路径或账号信息。
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
