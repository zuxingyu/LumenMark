name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Apple Silicon Rust target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin
      - name: Install frontend dependencies
        run: npm ci
      - name: Test frontend
        run: npm run test
      - name: Test Rust commands
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Bundle and upload release asset
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LumenMark ${{ github.ref_name }}
          releaseBody: |
            ## LumenMark v0.3.8 更新内容

            ### 新增与优化
            - 顶部按钮行已迁移到原生菜单栏，文件、导出、查找、语言、视图和格式命令按菜单类型分组。
            - 左侧工作区与文档大纲改为 Tab 切换，不再上下堆叠，正文编辑区域获得更清爽的界面空间。
            - 新增 `<u>text</u>` 下划线渲染支持，预览和导出保持一致。
            - Mermaid 预览支持点击显示对应源码，失焦后自动回到预览；流程图主题改为柔和高对比配色。
            - 代码块复制成功反馈改为与复制/自动换行按钮一致的线性图标。

            ### BUG 修复
            - 修复 PDF/PNG 导出遇到现代 CSS `color(...)` 函数时报错的问题。
            - 修复 `~2~` 下标显示不稳定的问题，同时保留 `~~删除线~~` 行为。
            - 修复工作区搜索清空、切换工作区、无工作区等状态下结果不稳定的问题。
            - 修复顶部按钮与原生菜单职责重复的问题。
            - 修复代码块复制成功后显示风格不一致的文本图标问题。

            ### 测试结果
            - 已执行前端单元与组件测试、生产构建、Rust/Tauri 命令测试。
            - 已新增 `docs/qa/v0.3.8-regression-report.md`，记录自动化测试、手动 QA、导出检查与已知风险。

            ### 发布说明
            - Windows 安装包仍为未签名测试版本，首次运行可能出现 SmartScreen 提示。
            - macOS DMG 使用系统 WebKit Runtime，应用包为 ad-hoc 签名，尚未 Apple 公证。
            - 本项目已公开，发布前已进行敏感信息扫描，未包含密钥、证书、私有配置、本地个人路径或账号信息。
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
