name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Apple Silicon Rust target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin
      - name: Install frontend dependencies
        run: npm ci
      - name: Test frontend
        run: npm run test
      - name: Test Rust commands
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Bundle and upload release asset
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LumenMark ${{ github.ref_name }}
          releaseBody: |
            v0.3.4 restores sidebar scrolling, keeps Mermaid diagrams in automatic focus-to-edit and blur-to-preview mode without a manual preview toggle, widens the writing surface, adds local draft recovery, and adds workspace-wide Markdown search. The Windows installer includes the WebView2 offline installer. The macOS DMG uses the system WebKit runtime, so installation and launch do not download an additional runtime. Test build for Windows x64 and macOS Apple Silicon. The Windows installer is unsigned. The macOS app bundle is ad-hoc signed to support Apple Silicon bundle validation, but is not notarized.

            Windows may display a SmartScreen warning. macOS users may need to allow the application through Finder Open or Privacy & Security on first launch.
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
