name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Apple Silicon Rust target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin
      - name: Install frontend dependencies
        run: npm ci
      - name: Test frontend
        run: npm run test
      - name: Test Rust commands
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Bundle and upload release asset
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LumenMark ${{ github.ref_name }}
          releaseBody: |
            ## LumenMark v0.3.10 更新内容

            ### 新增与优化
            - 导入主题现在会影响整个应用视觉，包括正文、代码块、公式/图表、侧栏、状态栏、弹窗和搜索框。
            - 设置入口已从“文件”菜单移到应用级 `LumenMark` 菜单，文件菜单只保留文件生命周期操作。
            - 设置弹窗重做为更紧凑的主题管理界面，支持导入主题的预览、应用和删除。
            - 继续保留跟随系统、浅色主题、深色主题和已导入主题的原生“主题”菜单。

            ### BUG 修复
            - 修复 GitHub Markdown / Typora 风格 CSS 导入后不生效的问题。
            - 修复深色模式下代码块、LaTeX 公式块和代码块工具按钮仍可能出现白底的问题。
            - 修复 LaTeX 块级公式无法像 Mermaid 一样点击预览后编辑源码的问题。
            - 继续阻止导入主题中的远程 URL、本地绝对路径、相对资源路径和 `@import`，避免公开项目泄露隐私路径。

            ### 测试结果
            - 已执行前端单元与组件测试、生产构建、Rust/Tauri 命令测试。
            - 已新增 `docs/qa/v0.3.10-regression-report.md`，记录自动化测试、手动 QA、主题导入检查与已知风险。

            ### 后续规划
            - v0.3.11-v0.3.13 将以主题兼容、编辑器稳定性、Markdown 语法和导出质量强化为主。
            - 中远期版本会支持导入完整 Typora 主题文件夹，包含 CSS、字体、图片等 assets 的复制、路径重写和安全校验。

            ### 发布说明
            - Windows 安装包仍为未签名测试版本，首次运行可能出现 SmartScreen 提示。
            - macOS DMG 使用系统 WebKit Runtime，应用包为 ad-hoc 签名，尚未 Apple 公证。
            - 本项目已公开，发布前已进行敏感信息扫描，未包含密钥、证书、私有配置、本地个人路径或账号信息。
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
