name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Apple Silicon Rust target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin
      - name: Install frontend dependencies
        run: npm ci
      - name: Test frontend
        run: npm run test
      - name: Test Rust commands
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Bundle and upload release asset
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LumenMark ${{ github.ref_name }}
          releaseBody: |
            ## LumenMark v0.3.7 更新内容

            ### 新增与优化
            - 新增 Typora 风格上标和下标语法：`^上标^`、`~下标~`，并保留 `~~删除线~~`。
            - 文本样式菜单新增“上标”“下标”，菜单项继续跟随中文/英文语言切换。
            - HTML、PDF、PNG 导出改为基于只读预览 DOM，减少编辑器内部 UI 对导出结果的影响。
            - 代码块复制成功后会短暂显示成功图标，约 2 秒后恢复复制图标。
            - v0.3.7 后续路线调整为稳定性和 BUG 维护优先，新增功能必须配套测试和验收。

            ### BUG 修复
            - 修复手动输入 `*`、`-`、`+` 后按空格不能自动转换为无序列表的问题。
            - 修复手动输入 `1.` 后按空格不能自动转换为有序列表的问题。
            - 修复 PDF 导出无法使用或导出结果不稳定的问题。
            - 修复 HTML 导出中 Mermaid 流程图被保留为源码代码块的问题。
            - 修复导出内容包含编辑器代码块工具按钮等应用 UI 的风险。
            - 修复代码块复制成功后缺少明确反馈的问题。

            ### 测试结果
            - 已执行前端单元与组件测试、生产构建、Rust/Tauri 命令测试。
            - 已新增 `docs/qa/v0.3.7-regression-report.md`，记录自动化测试、手动 QA、导出检查与已知风险。

            ### 发布说明
            - Windows 安装包仍为未签名测试版本，首次运行可能出现 SmartScreen 提示。
            - macOS DMG 使用系统 WebKit Runtime，应用包为 ad-hoc 签名，尚未 Apple 公证。
            - 本项目已公开，发布前已进行敏感信息扫描，未包含密钥、证书、私有配置、本地个人路径或账号信息。
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
