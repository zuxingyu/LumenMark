name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Apple Silicon Rust target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin
      - name: Install frontend dependencies
        run: npm ci
      - name: Test frontend
        run: npm run test
      - name: Test Rust commands
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Bundle and upload release asset
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LumenMark ${{ github.ref_name }}
          releaseBody: |
            ## LumenMark v0.3.11 更新内容

            ### 新增与优化
            - 新增 `LumenMark > 检查更新...`，支持从 GitHub Release 检查签名更新、下载、安装并重启。
            - 新增官方主题：GitHub Light、GitHub Dark Dimmed、GitHub Dark Colorblind、Oh My Zsh Dark、Monokai Terminal、Solarized Light、Lumen Paper、Lumen Ink。
            - 主题菜单和设置弹窗现在同时展示内置主题、官方主题和导入主题。
            - Release 现在生成 updater artifacts、签名文件和 `latest.json`，用于后续版本自动更新。

            ### BUG 修复
            - 优化导入主题 CSS 兼容与变量推导，改善工作区、大纲、搜索框、状态栏和链接弹框在深色/导入主题下的可读性。
            - 修复深色背景下 Mermaid journey、图片和图表预览标线不清的问题，预览内容使用高可读画布。
            - Mermaid 主题不再直接照搬页面深色背景，节点、连线和文字使用独立高对比变量。
            - 继续阻止导入主题中的远程 URL、本地绝对路径、相对资源路径和 `@import`，避免公开项目泄露隐私路径。

            ### 测试结果
            - 已执行前端单元与组件测试、生产构建、Rust/Tauri 命令测试和主题可读性检查。
            - 已新增 `docs/qa/v0.3.11-regression-report.md`，记录自动化测试、主题可读性 QA、更新流程 QA 与已知风险。

            ### 后续规划
            - v0.3.12-v0.3.13 将以编辑器稳定性、Markdown 语法和导出质量强化为主。
            - 中远期版本会支持导入完整 Typora 主题文件夹，包含 CSS、字体、图片等 assets 的复制、路径重写和安全校验。

            ### 发布说明
            - Windows 安装包仍为未签名测试版本，首次运行可能出现 SmartScreen 提示。
            - macOS DMG 使用系统 WebKit Runtime，应用包为 ad-hoc 签名，尚未 Apple 公证。
            - 本项目已公开，发布前已进行敏感信息扫描，未包含密钥、证书、私有配置、本地个人路径或账号信息。
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
